<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aventura Digital - Curso de Informática</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #050510;
    font-family: 'Courier New', monospace;
  }
  #title {
    font-family: 'Press Start 2P', monospace;
    font-size: 28px; color: #00ffcc;
    text-shadow: 0 0 30px #00ffcc88, 0 0 60px #00ffcc44;
    margin-bottom: 10px; letter-spacing: 3px;
    text-align: center;
    margin-top: 40px;
    margin-bottom: 20px;
  }
  canvas { 
    display: block; 
    image-rendering: pixelated; 
    border: 2px solid #4e768a;
    margin: 0 auto;
  }
  #keys {
    margin-top: 20px;
    font-size: 11px;
    color: #68829c;
    letter-spacing: 1px;
    text-align: center;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 18px 4px;
    margin-right: 15px;
    margin-left: 15px;
  }
  #keys kbd, #indexBtn {
    background: #0a1520; border: 1px solid #1a2a3a;
    color: #4488aa; padding: 4.2px 6px 3px 6px;
    font-family: 'Courier New', monospace; font-size: 10px;
  }
  #indexBtn {
    font-size: 1rem;
    padding: 10.2px 10px 9px 10px;
    color: #00ffcc;
    border: 1px solid #00ffcc;
  }
  #indexBtn:hover {
    cursor: pointer;
  }
  .selectGroup {
    text-align: center; 
    margin-top: 20px;
  }
  select {
    background: #0a1520;
    border: 1px solid #00ffcc;
    color: #00ffcc;
    font-family: 'Courier New', monospace;
    font-size: 1rem;
    padding: 10.2px 10px 9px 10px;
    cursor: pointer;
    margin-right: 15px;
  }
  select:focus {
    outline: none;
  }
  label {
    font-family: 'Courier New', monospace;
    font-size: 1rem;
    color: #4488aa;
    letter-spacing: 1px;
  }
  #filtros {
    text-align: center;
    margin-top: 16px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px 24px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: #4488aa;
    letter-spacing: 1px;
    margin-bottom: 40px;
  }
  input[type="range"] {
    accent-color: #27c6db; 
    vertical-align: middle; 
  }
  input[type="range"]:focus {
    outline: none;
  }
  @media only screen and (max-width: 665px) {
      canvas {
          width: 90%;
      }
  }
</style>
</head>
<body>
<div id="title">Aventura Digital</div>
<canvas id="c" width="640" height="480"></canvas>
<div id="keys">
  <span><kbd>Setas</kbd> / <kbd>WASD</kbd> mover</span>
  <span>·</span>
  <span><kbd>E</kbd> / <kbd>Espaço</kbd> interagir</span>
  <span>·</span>
  <span><kbd>G</kbd> Glossário</span>
  <span>·</span>
  <span><kbd>ESC</kbd> fechar janelas</span>
  <span>·</span>
  <span><kbd>PgUp</kbd> / <kbd>PgDn</kbd> rolar terminal</span>
</div>

<div class="selectGroup">
  <label for="scaleSelect">ZOOM:</label>
  <select id="scaleSelect" onchange="SCALE = parseFloat(this.value)">
    <option value="1" selected>100%</option>
    <option value="1.5">150%</option>
    <option value="2">200%</option>
    <option value="2.5">250%</option>
  </select>
  <button id="indexBtn" onclick="openIndex()">Página Inicial</button>
</div>

<div id="filtros">
  <label>BRILHO
    <input type="range" id="brilho" min="50" max="150" value="100">
    <span id="brilhoVal">100%</span>
  </label>

  <label>SATURAÇÃO
    <input type="range" id="saturacao" min="0" max="200" value="100">
    <span id="saturacaoVal">100%</span>
  </label>

  <label>CONTRASTE
    <input type="range" id="contraste" min="50" max="150" value="100">
    <span id="contrasteVal">100%</span>
  </label>

  <label>MATIZ
    <input type="range" id="matiz" min="0" max="360" value="0">
    <span id="matizVal">0°</span>
  </label>
</div>

<script>
// ═══════════════════════════════════════
//   Aventura Digital — RPG EDUCATIVO
//   Sistema: Tiles + Câmera + NPCs + Diálogos
// ═══════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let SCALE = 1;
const CVW = 640, CVH = 480;
const TS = 32;          // tile size px
const MC = 25, MR = 18; // map cols, rows

// ── Tile IDs ───────────────────────────
const G=0,  // Grass
      W=1,  // Wall
      P=2,  // Path (stone)
      A=3,  // wAter
      E=4,  // Exit portal
      T=5,  // Tree
      F=6,  // Floor (interior)
      B=7,  // Building wall
      R=8,  // Road
      K=9;  // Circuit (circ-board floor)
      L=10; // exit portaL (Left arrow)
      H=11; // High-tech lab floor
      V=12, // aVenue — futuristic neon road
      S=13, // Skyscraper wall
      Z=14; // city plaza (holographic ground)
      U=15, // exit Up arrow
      D=16, // exit Down arrow
      O=17, // Open-source terminal floor
      J=18; // community Junction floor
      X=19, // compiled code floor
      Y=20, // data stack floor
      Q=21; // interpreted/REPL floor
      C=22, // academic Circuit floor
      M=23, // theoretical Matrix floor
      N=24; // scientific network Node floor
      I=25; // flower (decorative, non-walkable)
      TC=26; // Terminal Computer (interactive object tile)
      AR=27; // ARbusto

const WALKABLE = new Set([G, P, E, F, R, K, L, H, V, Z, U, D, O, J, X, Y, Q, C, M, N]);

// ── Tile Renderer ──────────────────────
function drawTile(id, px, py, now) {
  const col = px / TS | 0, row = py / TS | 0; // tile coords for deterministic patterns
  switch (id) {
    case G: { // Grass
      ctx.fillStyle = '#172817';
      ctx.fillRect(px, py, TS, TS);

      // Hash determinístico por tile
      const hash = (n) => ((Math.sin(n) * 43758.5453) % 1 + 1) % 1;

      const pontos = [
        { cor: '#122212', s: 3 },
        { cor: '#1d3e1d', s: 2 },
        { cor: '#2a5c2a', s: 2 },
        { cor: '#1d3e1d', s: 3 },
        { cor: '#122212', s: 2 },
        { cor: '#2a5c2a', s: 2 },
      ];

      pontos.forEach((p, i) => {
        const ox = hash(col * 127 + row * 311 + i * 57)  * (TS - p.s) | 0;
        const oy = hash(col * 233 + row * 179 + i * 83)  * (TS - p.s) | 0;
        ctx.fillStyle = p.cor;
        ctx.fillRect(px + ox, py + oy, p.s, p.s);
      });

      break;
    }
    case W: { // Wall
      ctx.fillStyle = '#242436';
      ctx.fillRect(px, py, TS, TS);
      ctx.fillStyle = '#1a1a28';
      ctx.fillRect(px, py, TS, 1); ctx.fillRect(px, py, 1, TS);
      ctx.fillStyle = '#2e2e46';
      ctx.fillRect(px+1, py+1, TS-2, TS-2);
      ctx.fillStyle = '#232338';
      ctx.fillRect(px+2, py+2, 14, 13);
      ctx.fillRect(px+16+1, py+17, 13, 12);
      break;
    }
    case P: { // Stone path
      ctx.fillStyle = '#383626';
      ctx.fillRect(px, py, TS, TS);
      ctx.fillStyle = '#44422e';
      ctx.fillRect(px+1, py+1, TS-2, TS-2);
      ctx.fillStyle = '#38362a';
      ctx.fillRect(px+2, py+2, 13, 13);
      ctx.fillRect(px+17, py+17, 13, 13);
      break;
    }
    case A: { // Water (animated)
      const w = Math.sin(now*0.001 + col*0.4 + row*0.3);
      ctx.fillStyle = `hsl(210,68%,${17+w*4}%)`;
      ctx.fillRect(px, py, TS, TS);
      ctx.fillStyle = 'rgba(120,200,255,0.14)';
      const wx = (Math.sin(now*0.0008 + col*0.2)*6 + 6) | 0;
      ctx.fillRect(px+wx, py+7, TS-wx-4, 3);
      ctx.fillRect(px+(TS-wx-12), py+19, TS-wx-6, 2);
      break;
    }
    case E: { // Exit portal (animated)
      ctx.fillStyle = '#060618';
      ctx.fillRect(px, py, TS, TS);
      const pls = 0.5 + 0.5*Math.sin(now*0.004);
      ctx.fillStyle = `rgba(0,255,180,${0.15+pls*0.25})`;
      ctx.fillRect(px+4, py+4, TS-8, TS-8);
      ctx.strokeStyle = `rgba(0,255,180,${0.5+pls*0.5})`;
      ctx.lineWidth = 2;
      ctx.strokeRect(px+4, py+4, TS-8, TS-8);
      ctx.strokeStyle = '#00ffbb'; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(px+9, py+16); ctx.lineTo(px+22, py+16);
      ctx.moveTo(px+17,py+11); ctx.lineTo(px+22,py+16); ctx.lineTo(px+17,py+21);
      ctx.stroke();
      break;
    }
    case L: { // Exit portal — left arrow (animated)
      ctx.fillStyle = '#060618';
      ctx.fillRect(px, py, TS, TS);
      const plsL = 0.5 + 0.5*Math.sin(now*0.004);
      ctx.fillStyle = `rgba(0,255,180,${0.15+plsL*0.25})`;
      ctx.fillRect(px+4, py+4, TS-8, TS-8);
      ctx.strokeStyle = `rgba(0,255,180,${0.5+plsL*0.5})`;
      ctx.lineWidth = 2;
      ctx.strokeRect(px+4, py+4, TS-8, TS-8);
      ctx.strokeStyle = '#00ffbb'; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(px+23, py+16); ctx.lineTo(px+10, py+16);
      ctx.moveTo(px+15,py+11); ctx.lineTo(px+10,py+16); ctx.lineTo(px+15,py+21);
      ctx.stroke();
      break;
    }
    case T: { // Tree
      ctx.fillStyle = '#172817'; ctx.fillRect(px, py, TS, TS);
      ctx.fillStyle = '#4a2a08'; ctx.fillRect(px+13, py+20, 6, 12);
      ctx.fillStyle = '#175417';
      ctx.beginPath(); ctx.arc(px+16, py+12, 13, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#1e6a20';
      ctx.beginPath(); ctx.arc(px+13, py+10, 8, 0, Math.PI*2); ctx.fill();
      break;
    }
    case AR: { // Arbusto
      const hash = (n) => ((Math.sin(n) * 43758.5453) % 1 + 1) % 1;

      // Chão de grama embaixo
      ctx.fillStyle = '#172817';
      ctx.fillRect(px, py, TS, TS);

      // Tronco
      ctx.fillStyle = '#4a2a08';
      ctx.fillRect(px+13, py+24, 6, 8);

      // Massa principal (verde escuro)
      ctx.fillStyle = '#1a4d1a';
      ctx.beginPath();
      ctx.arc(px+16, py+15, 12, 0, Math.PI*2);
      ctx.fill();

      // Bolinhas secundárias para dar volume
      ctx.fillStyle = '#1f5c1f';
      ctx.beginPath(); ctx.arc(px+9,  py+17, 8, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(px+23, py+17, 8, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(px+16, py+10, 7, 0, Math.PI*2); ctx.fill();

      // Highlight (luz vindo de cima)
      ctx.fillStyle = '#2e7d2e';
      ctx.beginPath(); ctx.arc(px+14, py+11, 5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(px+8,  py+14, 4, 0, Math.PI*2); ctx.fill();

      break;
    }
    case F: { // Interior floor
      ctx.fillStyle = '#1e1e32'; ctx.fillRect(px, py, TS, TS);
      ctx.fillStyle = '#23233e'; ctx.fillRect(px+1, py+1, TS-2, TS-2);
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(px+2, py+2, TS/2-4, TS/2-4);
      ctx.fillRect(px+TS/2+2, py+TS/2+2, TS/2-4, TS/2-4);
      break;
    }
    case B: { // Building wall
      ctx.fillStyle = '#181828'; ctx.fillRect(px, py, TS, TS);
      ctx.fillStyle = '#20203a'; ctx.fillRect(px+2, py+2, TS-4, TS-4);
      const gl = 0.2 + 0.15*Math.sin(now*0.0015+col+row);
      ctx.fillStyle = `rgba(40,180,255,${gl})`;
      ctx.fillRect(px+7, py+7, 8, 8);
      ctx.fillRect(px+17, py+7, 8, 8);
      break;
    }
    case R: { // Road
      ctx.fillStyle = '#1e1e1e'; ctx.fillRect(px, py, TS, TS);
      ctx.fillStyle = '#262626'; ctx.fillRect(px+1, py+1, TS-2, TS-2);
      ctx.fillStyle = '#363636'; ctx.fillRect(px, py+14, TS, 4);
      break;
    }
    case K: { // Circuit board floor
      ctx.fillStyle = '#081412'; ctx.fillRect(px, py, TS, TS);
      ctx.strokeStyle = '#004422'; ctx.lineWidth = 1;
      ctx.strokeRect(px+4, py+4, TS-8, TS-8);
      ctx.fillStyle = '#002e16';
      ctx.fillRect(px+14, py, 4, TS); ctx.fillRect(px, py+14, TS, 4);
      const glow = 0.3 + 0.3*Math.sin(now*0.003+col*0.15+row*0.2);
      ctx.fillStyle = `rgba(0,220,100,${glow})`;
      ctx.fillRect(px+14, py+14, 4, 4);
      break;
    }
    case H: { // High-tech lab floor
      // Base 32x32
      ctx.fillStyle = '#0a0a1a'; ctx.fillRect(px, py, TS, TS);
      // Borda (4 lados com fillRect, igual ao padrão dos outros tiles)
      ctx.fillStyle = 'rgba(80,80,200,0.4)';
      ctx.fillRect(px,       py,       TS, 1);  // top
      ctx.fillRect(px,       py+TS-1,  TS, 1);  // bottom
      ctx.fillRect(px,       py,       1,  TS);  // left
      ctx.fillRect(px+TS-1,  py,       1,  TS);  // right
      // Cruz interna (começa em 1 e vai até TS-1 para não vazar na borda)
      ctx.fillStyle = 'rgba(60,60,160,0.3)';
      ctx.fillRect(px+15, py+1, 2, TS-2); // vertical
      ctx.fillRect(px+1, py+15, TS-2, 2); // horizontal
      // Quadradinhos nos 4 cantos
      ctx.fillStyle = '#12122e';
      ctx.fillRect(px+2,  py+2,  12, 12);
      ctx.fillRect(px+18, py+2,  12, 12);
      ctx.fillRect(px+2,  py+18, 12, 12);
      ctx.fillRect(px+18, py+18, 12, 12);
      // Centro pulsante
      const gh = 0.25 + 0.25*Math.sin(now*0.003 + col*0.2 + row*0.3);
      ctx.fillStyle = `rgba(100,80,255,${gh})`;
      ctx.fillRect(px+14, py+14, 4, 4);
      break;
    }
    case V: { // aVenue — futuristic neon road
      ctx.fillStyle = '#0c0c14'; ctx.fillRect(px, py, TS, TS);
      ctx.fillStyle = '#111118'; ctx.fillRect(px+1, py+1, TS-2, TS-2);
      // Faixas laterais neon — amplitude reduzida
      const nv = 0.3 + 0.1*Math.sin(now*0.002 + col*0.25);
      ctx.fillStyle = `rgba(0,220,255,${nv})`;
      ctx.fillRect(px, py,      TS, 2);
      ctx.fillRect(px, py+TS-2, TS, 2);
      // Linha central — usa sin em vez de on/off para transição suave
      const dash = 0.3 + 0.2*Math.sin(now*0.003 + col*0.8);
      ctx.fillStyle = `rgba(255,220,0,${dash})`;
      ctx.fillRect(px+14, py+12, 4, 8);
      break;
    }
    case S: { // Skyscraper wall
      ctx.fillStyle = '#080812'; ctx.fillRect(px, py, TS, TS);
      ctx.fillStyle = '#10101e'; ctx.fillRect(px+1, py+1, TS-2, TS-2);
      // Janelas com brilho independente por tile
      const sw  = 0.2 + 0.15*Math.sin(now*0.0018 + col*1.3 + row*0.9);
      const sw2 = 0.2 + 0.15*Math.sin(now*0.0022 + col*0.7 + row*1.4);
      ctx.fillStyle = `rgba(0,180,255,${sw})`;
      ctx.fillRect(px+4,  py+4,  10, 10);
      ctx.fillRect(px+18, py+18, 10, 10);
      ctx.fillStyle = `rgba(180,0,255,${sw2})`;
      ctx.fillRect(px+18, py+4,  10, 10);
      ctx.fillRect(px+4,  py+18, 10, 10);
      // Borda neon fina
      ctx.fillStyle = 'rgba(0,150,255,0.4)';
      ctx.fillRect(px,    py,    TS, 1);
      ctx.fillRect(px,    py,    1,  TS);
      break;
    }
    case Z: { // City plaza — holographic ground
      ctx.fillStyle = '#080810'; ctx.fillRect(px, py, TS, TS);
      // Grade holográfica com fillRect (sem stroke)
      const gz = 0.12 + 0.08*Math.sin(now*0.0015 + col*0.4 + row*0.3);
      ctx.fillStyle = `rgba(0,200,255,${gz})`;
      ctx.fillRect(px,    py+10, TS, 1);
      ctx.fillRect(px,    py+21, TS, 1);
      ctx.fillRect(px+10, py,    1,  TS);
      ctx.fillRect(px+21, py,    1,  TS);
      // Nós brilhantes nos cruzamentos
      const gr = 0.3 + 0.2*Math.sin(now*0.002 + col*0.5 + row*0.6);
      ctx.fillStyle = `rgba(0,255,255,${gr})`;
      ctx.fillRect(px+9,  py+9,  3, 3);
      ctx.fillRect(px+20, py+9,  3, 3);
      ctx.fillRect(px+9,  py+20, 3, 3);
      ctx.fillRect(px+20, py+20, 3, 3);
      break;
    }
    case U: { // exit Up arrow (animated)
      ctx.fillStyle = '#060618'; ctx.fillRect(px, py, TS, TS);
      const plsU = 0.5 + 0.5*Math.sin(now*0.004);
      ctx.fillStyle = `rgba(0,255,180,${0.15+plsU*0.25})`;
      ctx.fillRect(px+4, py+4, TS-8, TS-8);
      ctx.strokeStyle = `rgba(0,255,180,${0.5+plsU*0.5})`;
      ctx.lineWidth = 2;
      ctx.strokeRect(px+4, py+4, TS-8, TS-8);
      ctx.strokeStyle = '#00ffbb'; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(px+16, py+23); ctx.lineTo(px+16, py+10);
      ctx.moveTo(px+11, py+15); ctx.lineTo(px+16, py+10); ctx.lineTo(px+21, py+15);
      ctx.stroke();
      break;
    }
    case D: { // exit Down arrow (animated)
      ctx.fillStyle = '#060618'; ctx.fillRect(px, py, TS, TS);
      const plsD = 0.5 + 0.5*Math.sin(now*0.004);
      ctx.fillStyle = `rgba(0,255,180,${0.15+plsD*0.25})`;
      ctx.fillRect(px+4, py+4, TS-8, TS-8);
      ctx.strokeStyle = `rgba(0,255,180,${0.5+plsD*0.5})`;
      ctx.lineWidth = 2;
      ctx.strokeRect(px+4, py+4, TS-8, TS-8);
      ctx.strokeStyle = '#00ffbb'; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(px+16, py+9);  ctx.lineTo(px+16, py+22);
      ctx.moveTo(px+11, py+17); ctx.lineTo(px+16, py+22); ctx.lineTo(px+21, py+17);
      ctx.stroke();
      break;
    }
    case O: { // Open-source terminal floor
      ctx.fillStyle = '#030d03'; ctx.fillRect(px, py, TS, TS);
      // Scanlines
      ctx.fillStyle = 'rgba(0,40,0,0.6)';
      ctx.fillRect(px, py+8,  TS, 2);
      ctx.fillRect(px, py+20, TS, 2);
      // Borda terminal verde
      ctx.fillStyle = 'rgba(0,180,0,0.35)';
      ctx.fillRect(px,       py,      TS, 1);
      ctx.fillRect(px,       py+TS-1, TS, 1);
      ctx.fillRect(px,       py,      1,  TS);
      ctx.fillRect(px+TS-1,  py,      1,  TS);
      // Cursor piscante por tile
      const cur = Math.sin(now*0.005 + col*0.9 + row*1.1) > 0.3;
      if (cur) {
        ctx.fillStyle = `rgba(0,255,60,0.7)`;
        ctx.fillRect(px+4, py+12, 8, 2);
      }
      // Caracteres simulados
      ctx.fillStyle = 'rgba(0,160,0,0.25)';
      ctx.fillRect(px+4,  py+5,  6, 1);
      ctx.fillRect(px+12, py+5,  8, 1);
      ctx.fillRect(px+4,  py+22, 10, 1);
      ctx.fillRect(px+16, py+22, 5,  1);
      break;
    }
    case J: { // community Junction floor
      ctx.fillStyle = '#110a00'; ctx.fillRect(px, py, TS, TS);
      // Padrão de madeira clara — piso de coworking
      ctx.fillStyle = '#1a1000';
      ctx.fillRect(px+1,  py+1,  TS-2, 6);
      ctx.fillRect(px+1,  py+17, TS-2, 6);
      ctx.fillStyle = '#160d00';
      ctx.fillRect(px+1,  py+9,  13, 12);
      ctx.fillRect(px+16, py+9,  TS-17, 12);
      // Brilho âmbar suave
      const jg = 0.08 + 0.05*Math.sin(now*0.001 + col*0.3 + row*0.4);
      ctx.fillStyle = `rgba(255,160,0,${jg})`;
      ctx.fillRect(px+4, py+4, TS-8, TS-8);
      break;
    }
    case X: { // compiled code floor — blocos encaixados, tom ferrugem/laranja
      ctx.fillStyle = '#0e0800'; ctx.fillRect(px, py, TS, TS);
      // Blocos de bytecode encaixados
      ctx.fillStyle = '#1c1000';
      ctx.fillRect(px+1,  py+1,  14, 14);
      ctx.fillRect(px+17, py+1,  13, 14);
      ctx.fillRect(px+1,  py+17, 14, 13);
      ctx.fillRect(px+17, py+17, 13, 13);
      // Conectores entre blocos
      ctx.fillStyle = '#2a1800';
      ctx.fillRect(px+15, py+6,  2, 4);
      ctx.fillRect(px+15, py+22, 2, 4);
      ctx.fillRect(px+6,  py+15, 4, 2);
      ctx.fillRect(px+22, py+15, 4, 2);
      // Brilho laranja pulsante

const held = {};    // keys held down
const newk = new Set(); // keys just pressed this frame (buffer)
document.addEventListener('keydown', e => {
  // Terminal captura input de texto diretamente
  if (gs.terminal) {
    if (e.key === 'Escape') { gs.terminal = null; e.preventDefault(); return; }
    if (e.key === 'Enter') {
      const cmd = gs.terminal.input.trim();
      if (cmd) gs.terminal.history.unshift(cmd);
      gs.terminal.histIdx = -1;
      gs.terminal.lines.push('user@aventura:~$ ' + cmd);
      const out = runCommand(cmd);
      out.forEach(l => gs.terminal.lines.push(l));
      gs.terminal.input = '';
      gs.terminal.scroll = 0;
      // Keep only last 40 lines
      if (gs.terminal.lines.length > 200) gs.terminal.lines = gs.terminal.lines.slice(-200);
      e.preventDefault(); return;
    }
    if (e.key === 'Backspace') { gs.terminal.input = gs.terminal.input.slice(0,-1); e.preventDefault(); return; }
    if (e.key === 'PageUp') { gs.terminal.scroll += 5; e.preventDefault(); return; }
    if (e.key === 'PageDown') { gs.terminal.scroll = Math.max(0, gs.terminal.scroll - 5); e.preventDefault(); return; }
    if (e.key === 'ArrowUp') {
      if (gs.terminal.histIdx < gs.terminal.history.length-1) gs.terminal.histIdx++;
      gs.terminal.input = gs.terminal.history[gs.terminal.histIdx] || '';
      e.preventDefault(); return;
    }
    if (e.key === 'ArrowDown') {
      gs.terminal.histIdx = Math.max(-1, gs.terminal.histIdx-1);
      gs.terminal.input = gs.terminal.histIdx >= 0 ? gs.terminal.history[gs.terminal.histIdx] : '';
      e.preventDefault(); return;
    }
    if (e.key.length === 1) { gs.terminal.input += e.key; e.preventDefault(); return; }
    e.preventDefault(); return;
  }
  if (!held[e.code]) newk.add(e.code);
  held[e.code] = true;
  e.preventDefault();
});
document.addEventListener('keyup', e => { held[e.code] = false; });

};
const MOVE_DELAY = 150; // ms between tile moves

// ── Helpers ───────────────────────────
function tileAt(mapId, tx, ty) {
  const m = MAPS[mapId];
  if (tx < 0 || ty < 0 || tx >= MC || ty >= MR) return W;
  return m.tiles[ty][tx];
}

function isWalkable(mapId, tx, ty) {
  return WALKABLE.has(tileAt(mapId, tx, ty));
}

function npcAt(mapId, tx, ty) {
  return MAPS[mapId].npcs.find(n => n.x === tx && n.y === ty) || null;
}

function terminalAt(mapId, tx, ty) {
  return tileAt(mapId, tx, ty) === TC;
}

// ── Camera ────────────────────────────
function getCamera() {
  const vw = CVW / SCALE, vh = CVH / SCALE;
  const maxX = MC * TS - vw, maxY = MR * TS - vh;
  let cx = gs.px * TS + TS/2 - vw/2;
  let cy = gs.py * TS + TS/2 - vh/2;
  return {
    x: Math.max(0, Math.min(cx, maxX)),
    y: Math.max(0, Math.min(cy, maxY)),
  };
}

// ── Update ────────────────────────────
let lastTs = 0;
function update(dt, just) {
  if (gs.screen === 'title') {
    if (just.has('Enter') || just.has('NumpadEnter') || just.has('Space')) gs.screen = 'game';
    return;
  }
  if (gs.fading) { updateFade(dt); return; }

  // ── Dialog input ──
  if (gs.dialog) {
    if (just.has('KeyE') || just.has('Space') || just.has('Enter')) {
      gs.dialog.line++;
      if (gs.dialog.line >= gs.dialog.npc.lines.length) {
        gs.learned.add(gs.dialog.npc.topic);
        gs.dialog = null;
      }
    }
    if (just.has('Escape')) gs.dialog = null;
    return;
  }

  if (just.has('KeyG')) {
    gs.glossary = !gs.glossary;
    gs.glossaryScroll = 0;
  }
  if (gs.glossary) {
    if (just.has('Escape')) gs.glossary = false;
    if (held['ArrowDown'] || held['KeyS']) gs.glossaryScroll++;
    if (held['ArrowUp']   || held['KeyW']) gs.glossaryScroll--;
    return; // bloqueia movimento enquanto glossário está aberto
  }

  // ── Movement ──
  gs.moveTimer += dt;
  if (gs.moveTimer >= MOVE_DELAY) {
    let nx = gs.px, ny = gs.py;
    if (held['ArrowLeft']  || held['KeyA']) nx--;
    else if (held['ArrowRight'] || held['KeyD']) nx++;
    else if (held['ArrowUp']    || held['KeyW']) ny--;
    else if (held['ArrowDown']  || held['KeyS']) ny++;

    if (nx !== gs.px || ny !== gs.py) {
      if (!npcAt(gs.mapId, nx, ny) && isWalkable(gs.mapId, nx, ny)) {
        gs.px = nx; gs.py = ny;
        gs.moving = true; // ← moveu
        const ex = MAPS[gs.mapId].exits.find(e => e.x === nx && e.y === ny);
        if (ex) startFade(ex.to, ex.tx, ex.ty);
      }
      gs.moveTimer = 0;
    } else {
      gs.moving = false; // ← parado
    }
  }

  // ── Interact ──
  if (just.has('KeyE') || just.has('Space')) {
    const dirs = [
      {x:gs.px-1,y:gs.py},{x:gs.px+1,y:gs.py},
      {x:gs.px,y:gs.py-1},{x:gs.px,y:gs.py+1},
      {x:gs.px-1,y:gs.py-1},{x:gs.px+1,y:gs.py-1},
      {x:gs.px-1,y:gs.py+1},{x:gs.px+1,y:gs.py+1},
    ];
    // Check terminal first
    let foundTerminal = false;
    for (const d of dirs) {
      if (terminalAt(gs.mapId, d.x, d.y)) { openTerminal(); foundTerminal = true; break; }
    }
    if (!foundTerminal) {
      for (const d of dirs) {
        const n = npcAt(gs.mapId, d.x, d.y);
        if (n) { gs.dialog = {npc:n, line:0}; break; }
      }
    }
  }
}

function runCommand(raw) {
  const parts = raw.trim().split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const arg = parts.slice(1).join(' ');
  const out = [];
 
  switch(cmd) {
    case 'help':
      out.push('Comandos disponíveis:');
      out.push('  ls              — lista arquivos disponíveis');
      out.push('  cat <arquivo>   — exibe conteúdo de um arquivo');
      out.push('  man <tema>      — manual de um tema (algoritmos, grafos, rede...)');
      out.push('  whoami          — quem é você');
      out.push('  uname           — informações do sistema');
      out.push('  pwd             — diretório atual');
      out.push('  history         — histórico de comandos');
      out.push('  progress        — seu progresso no jogo');
      out.push('  clear           — limpa o terminal');
      out.push('  echo <texto>    — repete o texto');
      out.push('  date            — data e hora atual');
      break;
 
    case 'ls':
      out.push('total ' + Object.keys(TERM_FILES).length);
      Object.keys(TERM_FILES).forEach(f => out.push('  -rw-r--r--  ' + f));
      break;
 
    case 'cat':
      if (!arg) { out.push('Uso: cat <arquivo>. Tente: cat readme.txt'); break; }
      const f = TERM_FILES[arg] || TERM_FILES[arg + '.txt'];
      if (f) { f.forEach(l => out.push(l)); }
      else out.push('cat: ' + arg + ': arquivo não encontrado. Use "ls" para listar.');
      break;
 
    case 'man':
      const manPages = {
        algoritmos: ['ALGORITMOS(1)', '', 'Nome: Algoritmos - sequências de passos computacionais', '', 'Descrição: Um algoritmo é qualquer procedimento computacional bem definido', 'que transforma entradas em saídas. A análise de complexidade usa notação', 'Big-O para descrever comportamento assintótico no pior caso.', '', 'Ver também: grafos(1), paralelo(1)'],
        grafos: ['GRAFOS(1)', '', 'Nome: Teoria dos Grafos - estruturas de nós e arestas', '', 'Descrição: Grafo G=(V,E) onde V são vértices e E arestas.', 'Fundamental para modelar redes, dependências e caminhos.', '', 'Ver também: algoritmos(1), sistemas(1)'],
        rede: ['REDES(1)', '', 'Nome: Redes de Computadores', '', 'TCP/IP: protocolo base da internet.', 'DNS: resolução de nomes. HTTP/HTTPS: protocolo web.', 'BGP: roteamento entre sistemas autônomos na internet.'],
        crypto: ['CRYPTO(1)', '', 'Nome: Criptografia Computacional', '', 'RSA: baseado em fatoração de primos. Seguro até ~2048 bits hoje.', 'ECC: Elliptic Curve Cryptography - mesma segurança com chaves menores.', 'AES: padrão simétrico. Blocos de 128 bits, chaves de 128/192/256 bits.'],
      };
      const page = manPages[arg.toLowerCase()];
      if (page) { page.forEach(l => out.push(l)); }
      else { out.push('Nenhum manual para "' + arg + '".'); out.push('Tópicos: algoritmos, grafos, rede, crypto'); }
      break;
 
    case 'whoami':
      out.push('aventureiro@aventuradigital');
      out.push('Nível: Explorador da Ciência da Computação');
      out.push('Lições aprendidas: ' + gs.learned.size + '/' + Object.values(MAPS).flatMap(m=>m.npcs).length);
      break;
 
    case 'uname':
      out.push('AventuraOS 1.0.0 (Canvas Edition)');
      out.push('Arquitetura: 2D-tile-based');
      out.push('Kernel: GameLoop/rAF v60hz');
      break;
 
    case 'pwd':
      out.push('/home/aventureiro/cs-lab/terminal');
      break;
 
    case 'date':
      out.push(new Date().toLocaleString('pt-BR'));
      break;
 
    case 'echo':
      out.push(arg || '');
      break;
 
    case 'history':
      if (!gs.terminal.history.length) { out.push('(histórico vazio)'); break; }
      gs.terminal.history.slice().reverse().forEach((h,i) => out.push(`  ${i+1}  ${h}`));
      break;
 
    case 'progress': {
      const allNpcs = Object.values(MAPS).flatMap(m => m.npcs);
      out.push('=== Progresso do Aventureiro ===');
      Object.entries(MAPS).forEach(([id, map]) => {
        const done = map.npcs.filter(n => gs.learned.has(n.topic)).length;
        const total = map.npcs.length;
        const bar = '█'.repeat(done) + '░'.repeat(total-done);
        out.push(`  ${map.name.padEnd(30)} [${bar}] ${done}/${total}`);
      });
      out.push('Total: ' + gs.learned.size + '/' + allNpcs.length);
      break;
    }
 
    case 'clear':
      gs.terminal.lines = [];
      break;
 
    case 'sudo':
      out.push('Este terminal não suporta privilégios de root.');
      out.push('Nice try, hacker.');
      break;
 
    case 'rm':
      out.push('rm: operação negada. Este é um terminal de pesquisa.');
      break;

    case 'matrix':
      out.push('Acorde aventureiro... A matrix possui você...');
      break;

    case 'hack':
      out.push('Acesso negado. Você não é Neo.');
      out.push('... mas que tal aprender criptografia? cat criptografia.txt');
      break;
 
    case '':
      break;
 
    default:
      out.push(cmd + ': comando não encontrado. Digite "help" para ajuda.');
  }
  return out;
}
 
function openTerminal() {

      '',
    ],
    input: '',
    history: [],
    histIdx: -1,
    scroll: 0,
  };
}

function startFade(to, tx, ty) {
  gs.fading = {to, tx, ty, phase:'out'};
  gs.fade = 0;
}

function updateFade(dt) {
  const sp = 0.0025;
  if (gs.fading.phase === 'out') {
    gs.fade = Math.min(1, gs.fade + sp*dt);
    if (gs.fade >= 1) {
      gs.mapId = gs.fading.to;
      gs.px = gs.fading.tx;
      gs.py = gs.fading.ty;
      gs.fading.phase = 'in';
    }
  } else {
    gs.fade = Math.max(0, gs.fade - sp*dt);
    if (gs.fade <= 0) gs.fading = null;
    gs.moving = false;
  }
}

// ── Rendering ─────────────────────────
function render(now) {
  if (gs.screen === 'title') { drawTitle(now); return; }
  ctx.clearRect(0, 0, CVW, CVH);
  const map = MAPS[gs.mapId];
  const cam = getCamera();

  ctx.save();
  ctx.scale(SCALE, SCALE);
  ctx.translate(-cam.x, -cam.y);
 
  // Tiles (only visible range)
  const c0 = Math.max(0, (cam.x/TS)|0);
  const r0 = Math.max(0, (cam.y/TS)|0);
  const c1 = Math.min(MC, c0 + ((CVW/SCALE)/TS|0) + 2);
  const r1 = Math.min(MR, r0 + ((CVH/SCALE)/TS|0) + 2);
  for (let r = r0; r < r1; r++)
    for (let c = c0; c < c1; c++)
      drawTile(map.tiles[r][c], c*TS, r*TS, now);

  // NPCs
  for (const npc of map.npcs) drawNPC(npc, now);

  // Player
  drawPlayer(now);

  ctx.restore();

  // HUD
  drawHUD(map, now);

  // Dialog
  if (gs.dialog) drawDialog(gs.dialog, now);
  if (gs.terminal) drawTerminal(now);

  if (gs.glossary) drawGlossary(now);

  // Fade overlay
  if (gs.fade > 0) {
    ctx.fillStyle = `rgba(0,0,0,${gs.fade})`;
    ctx.fillRect(0, 0, CVW, CVH);
  }
}

function drawGlossary(now) {
  // Monta lista de todos os NPCs do jogo
  const allNpcs = Object.values(MAPS).flatMap(m => m.npcs);

  // Overlay escuro
  ctx.fillStyle = 'rgba(2,2,18,0.96)';
  ctx.fillRect(0, 0, CVW, CVH);
  ctx.strokeStyle = '#00ffcc';
  ctx.lineWidth = 2;
  ctx.strokeRect(10, 10, CVW-20, CVH-20);

  // Título
  ctx.textAlign = 'center';
  ctx.font = 'bold 14px monospace';
  ctx.fillStyle = '#00ffcc';
  ctx.fillText('GLOSSÁRIO DE TECNOLOGIA', CVW/2, 36);
  ctx.font = '9px monospace';
  ctx.fillStyle = '#87afd4';
  ctx.fillText(`${gs.learned.size} de ${allNpcs.length} conceitos aprendidos`, CVW/2, 52);

  // Barra de progresso
  ctx.fillStyle = '#0a1a2a';
  ctx.fillRect(40, 58, CVW-80, 6);
  ctx.fillStyle = gs.learned.size === allNpcs.length ? '#00ffcc' : '#ffdd44';
  ctx.fillRect(40, 58, (CVW-80)*(gs.learned.size/allNpcs.length), 6);
  ctx.strokeStyle = '#1a3a5a'; ctx.lineWidth = 1;
  ctx.strokeRect(40, 58, CVW-80, 6);

  // Lista de termos (2 colunas)
  const itemH = 44;
  const cols = 2;
  const colW = (CVW - 40) / cols;
  const startY = 80;
  const visibleRows = Math.floor((CVH - startY - 30) / itemH);
  const maxScroll = Math.max(0, Math.ceil(allNpcs.length / cols) - visibleRows);
  gs.glossaryScroll = Math.max(0, Math.min(gs.glossaryScroll, maxScroll));

  ctx.save();
  ctx.beginPath();
  ctx.rect(10, startY, CVW-20, CVH-startY-30);
  ctx.clip();

  allNpcs.forEach((npc, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols) - gs.glossaryScroll;
    if (row < 0 || row >= visibleRows) return;

    const ix = 25 + col * colW;
    const iy = startY + row * itemH;
    const learned = gs.learned.has(npc.topic);

    // Card
    ctx.fillStyle = learned ? 'rgba(0,40,30,0.7)' : 'rgba(10,10,25,0.7)';
    roundRect(ctx, ix, iy+2, colW-10, itemH-6, 4); ctx.fill();
    ctx.strokeStyle = learned ? '#00ffcc' : '#1a2a3a';
    ctx.lineWidth = 1;
    roundRect(ctx, ix, iy+2, colW-10, itemH-6, 4); ctx.stroke();

    // Ícone de status
    ctx.font = '12px monospace';
    ctx.textAlign = 'left';
    ctx.fillStyle = learned ? '#00ffcc' : '#2a3a4a';
    ctx.fillText(learned ? '✓' : '?', ix+8, iy+18);

    // Nome do NPC
    ctx.font = `bold 10px monospace`;
    ctx.fillStyle = learned ? npc.color : '#2a3a4a';
    ctx.fillText(npc.name, ix+22, iy+18);

    // Tópico
    ctx.font = '9px monospace';
    ctx.fillStyle = learned ? '#aacccc' : '#1a2a3a';
    // Quebra o tópico se for longo
    const maxW = colW - 36;
    let topic = npc.topic;
    if (ctx.measureText(topic).width > maxW) {
      topic = topic.slice(0, 28) + '…';
    }
    ctx.fillText(topic, ix+22, iy+31);
  });

  ctx.restore();

  // Rodapé
  ctx.textAlign = 'center';
  ctx.font = '11px monospace';
  ctx.fillStyle = '#87afd4';
  ctx.fillText('↑↓ rolar  •  G ou ESC fechar', CVW/2, CVH-24);
}

function drawTitle(now) {
  // Fundo
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, CVW, CVH);

  // Grade de circuito decorativa
  ctx.strokeStyle = 'rgba(0,255,180,0.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x < CVW; x += 32) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,CVH); ctx.stroke(); }
  for (let y = 0; y < CVH; y += 32) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(CVW,y); ctx.stroke(); }

  // Título
  const glow = 0.7 + 0.3 * Math.sin(now * 0.002);
  ctx.textAlign = 'center';
  ctx.font = 'bold 48px monospace';
  ctx.shadowColor = '#00ffcc';
  ctx.shadowBlur = 30 * glow;
  ctx.fillStyle = `rgba(0,255,200,${glow})`;
  ctx.fillText('Aventura Digital', CVW/2, CVH/2 - 60);
  ctx.shadowBlur = 0;

  // Subtítulo
  ctx.font = '14px monospace';
  ctx.fillStyle = '#4a6a88';
  ctx.fillText('RPG Educativo — Explore o mundo da tecnologia!', CVW/2, CVH/2 - 20);

  // Prompt piscante
  const blink = Math.sin(now * 0.004) > 0;
  if (blink) {
    ctx.font = 'bold 16px monospace';
    ctx.fillStyle = '#00ffcc';
    ctx.fillText('[ ENTER ] ou [ ESPAÇO ] para iniciar', CVW/2, CVH/2 + 40);
  }
}

// ── Player Drawing ────────────────────
function drawPlayer(now) {
  const px = gs.px * TS, py = gs.py * TS;
  const bob = Math.sin(now * 0.005) * 1.2;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(px+16, py+29, 8, 3, 0, 0, Math.PI*2); ctx.fill();

  // Body
  ctx.fillStyle = '#3366cc';
  ctx.fillRect(px+9, py+10+bob, 14, 14);

  // Head
  ctx.fillStyle = '#f0c070';
  ctx.fillRect(px+10, py+2+bob, 12, 12);

  // Hair
  ctx.fillStyle = '#553300';
  ctx.fillRect(px+10, py+1+bob, 12, 5);

  // Eyes
  ctx.fillStyle = '#2a1a0a';
  ctx.fillRect(px+13, py+7+bob, 2, 2);
  ctx.fillRect(px+17, py+7+bob, 2, 2);

  // Legs (animated)
  const leg = gs.moving ? Math.sin(now * 0.012) * 2 : 0;
  ctx.fillStyle = '#224488';
  ctx.fillRect(px+10, py+24+bob, 5, 5 + leg);
  ctx.fillRect(px+17, py+24+bob, 5, 5 - leg);

  // [E] prompt when near NPC
  const dirs = [
    {x:gs.px-1,y:gs.py},  {x:gs.px+1,y:gs.py},
    {x:gs.px,y:gs.py-1},  {x:gs.px,y:gs.py+1},
    {x:gs.px-1,y:gs.py-1},{x:gs.px+1,y:gs.py-1},
    {x:gs.px-1,y:gs.py+1},{x:gs.px+1,y:gs.py+1},
  ];
  const nearInteract = dirs.some(d => npcAt(gs.mapId, d.x, d.y) || terminalAt(gs.mapId, d.x, d.y));
  if (nearInteract) {
    const p = 0.5 + 0.5*Math.sin(now * 0.004);
    ctx.fillStyle = `rgba(0,255,180,${p})`;
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('[E]', px+16, py+1+bob);
  }
}

// ── Terminal Rendering ────────────────
function drawTerminal(now) {
  const bx=20, by=30, bw=CVW-40, bh=CVH-60;
  const SBW = 8; // scrollbar width
 
  // Fundo
  ctx.fillStyle='rgba(2,8,2,0.97)';
  roundRect(ctx,bx,by,bw,bh,6); ctx.fill();
  ctx.strokeStyle='#00cc44'; ctx.lineWidth=2;
  roundRect(ctx,bx,by,bw,bh,6); ctx.stroke();
 
  // Barra de título
  ctx.fillStyle='#003300';
  ctx.fillRect(bx+2, by+2, bw-4, 18);
  ctx.textAlign='center';
  ctx.font='bold 10px monospace';
  ctx.fillStyle='#00ff44';
  ctx.fillText('AVENTURA DIGITAL TERMINAL — ESC para fechar', CVW/2, by+15);
 
  // Calcular scroll
  ctx.font='11px monospace';
  ctx.textAlign='left';
  const lineH=14, startY=by+36, maxLines=Math.floor((bh-50)/lineH);
  const totalLines = gs.terminal.lines.length;
  const maxScroll = Math.max(0, totalLines - maxLines);
  gs.terminal.scroll = Math.max(0, Math.min(gs.terminal.scroll, maxScroll));
 
  // Janela de linhas visíveis (scroll=0 → fundo)
  const fromIdx = maxScroll - gs.terminal.scroll;
  const visible = gs.terminal.lines.slice(fromIdx, fromIdx + maxLines);
 
  // Clip output area
  ctx.save();
  ctx.beginPath();
  ctx.rect(bx+2, startY-lineH, bw - SBW - 6, maxLines*lineH + lineH);
  ctx.clip();
  visible.forEach((line,i) => {
    const isPrompt = line.startsWith('user@');
    const isTitle  = line.startsWith('╔') || line.startsWith('║') || line.startsWith('╚');
    ctx.fillStyle = isTitle ? '#00ffaa' : isPrompt ? '#00ff44' : '#88cc88';
    ctx.fillText(line, bx+10, startY+i*lineH);
  });
  ctx.restore();
 
  // Scrollbar (só quando há conteúdo para rolar)
  if (maxScroll > 0) {
    const sbX = bx + bw - SBW - 4;
    const sbTop = startY - 2;
    const sbH = maxLines * lineH;
 
    // Trilha
    ctx.fillStyle = '#001400';
    ctx.fillRect(sbX, sbTop, SBW, sbH);
 
    // Thumb proporcional
    const thumbH = Math.max(16, (maxLines / totalLines) * sbH);
    const scrollRatio = gs.terminal.scroll / maxScroll; // 0=fundo, 1=topo
    const thumbY = sbTop + (1 - scrollRatio) * (sbH - thumbH);
    ctx.fillStyle = gs.terminal.scroll > 0 ? '#00aa33' : '#005511';
    ctx.fillRect(sbX, thumbY, SBW, thumbH);
 
    // Dica piscante quando não está no fundo
    if (gs.terminal.scroll > 0) {
      const p = 0.5 + 0.5*Math.sin(now*0.005);
      ctx.fillStyle = `rgba(0,255,100,${p})`;
      ctx.font = '9px monospace';
      ctx.textAlign = 'right';
      ctx.fillText('PgUp/PgDn para rolar', bx+bw-14, by+bh-22);
    }
  }
 
  // Linha de input
  const inputY = by+bh-20;
  ctx.fillStyle='#001800';
  ctx.fillRect(bx+2, inputY-12, bw-4, 16);
  ctx.fillStyle='#00ff44';
  ctx.font='11px monospace';
  ctx.textAlign='left';
  const promptTxt='user@aventura:~$ ';
  const cursor = Math.sin(now*0.006) > 0 ? '█' : ' ';
  ctx.fillText(promptTxt + gs.terminal.input + cursor, bx+10, inputY);
}

// ── NPC Drawing ───────────────────────
function drawNPC(npc, now) {
  const px = npc.x * TS, py = npc.y * TS;
  const bob = Math.sin(now * 0.002 + npc.x * 0.7) * 1.2;
  const learned = gs.learned.has(npc.topic);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(px+16, py+30, 8, 3, 0, 0, Math.PI*2); ctx.fill();

  // Body
  ctx.fillStyle = npc.color;
  ctx.fillRect(px+9, py+13+bob, 14, 14);

  // Head
  ctx.fillStyle = '#f0c070';
  ctx.fillRect(px+10, py+5+bob, 12, 12);

  // Hat (brim + crown)
  ctx.fillStyle = npc.hat;
  ctx.fillRect(px+7, py+3+bob, 18, 4);
  ctx.fillRect(px+10, py-1+bob, 12, 5);

  // Eyes
  ctx.fillStyle = '#2a1a0a';
  ctx.fillRect(px+13, py+9+bob, 2, 2);
  ctx.fillRect(px+17, py+9+bob, 2, 2);
  // Smile
  ctx.fillStyle = '#2a1a0a';
  ctx.fillRect(px+13, py+13+bob, 6, 1);

  // Name tag bubble
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  const tw = ctx.measureText(npc.name).width;
  const bx = px+16-tw/2-5, by = py-19, bw = tw+10, bh = 14;
  ctx.fillStyle = 'rgba(5,5,20,0.85)';
  roundRect(ctx, bx, by, bw, bh, 2); ctx.fill();
  ctx.strokeStyle = learned ? '#00ffcc' : npc.color;
  ctx.lineWidth = 1;
  roundRect(ctx, bx, by, bw, bh, 2); ctx.stroke();
  ctx.fillStyle = learned ? '#00ffcc' : '#e8e8ff';
  ctx.fillText(npc.name, px+16, py-8.5);
}

// ── HUD Drawing ───────────────────────
function drawHUD(map, now) {
  // Top gradient bar
  const tg = ctx.createLinearGradient(0,0,0,44);
  tg.addColorStop(0,'rgba(5,5,20,0.97)');
  tg.addColorStop(1,'rgba(5,5,20,0)');
  ctx.fillStyle = tg; ctx.fillRect(0,0,CVW,44);

  // Map name
  ctx.textAlign = 'left';
  ctx.font = 'bold 13px monospace';
  ctx.fillStyle = '#00ffcc';
  ctx.fillText(map.name, 10, 20);
  ctx.font = '10px monospace';
  ctx.fillStyle = '#87afd4';
  ctx.fillText(map.sub, 10, 35);

  // Lessons progress (top right)
  const total = Object.values(MAPS).reduce((s,m)=>s+m.npcs.length,0);
  const done = gs.learned.size;
  ctx.textAlign = 'right';
  ctx.font = 'bold 11px monospace';
  ctx.fillStyle = '#ffdd44';
  ctx.fillText(`${done}/${total} lições`, CVW-10, 19);
  // Progress bar
  ctx.fillStyle = '#1a2a3a';
  ctx.fillRect(CVW-114, 25, 104, 7);
  ctx.fillStyle = done === total ? '#00ffcc' : '#ffdd44';
  ctx.fillRect(CVW-114, 25, 104*(done/total), 7);
  ctx.strokeStyle = '#334455'; ctx.lineWidth = 1;
  ctx.strokeRect(CVW-114, 25, 104, 7);

  // All learned celebration
  if (done === total) {
    const p = 0.5+0.5*Math.sin(now*0.003);
    ctx.textAlign='center';
    ctx.font='bold 11px monospace';
    ctx.fillStyle=`rgba(0,255,200,${p})`;
    ctx.fillText('PARABÉNS! Você aprendeu todos os conceitos!', CVW/2, 470);
  }
}

// ── Dialog Box ───────────────────────
function drawDialog(dlg, now) {
  const npc = dlg.npc, line = npc.lines[dlg.line];
  const total = npc.lines.length, cur = dlg.line + 1;
  const bx=10, by=CVH-130, bw=CVW-20, bh=120;

  // Box
  ctx.fillStyle='rgba(4,4,18,0.97)';
  roundRect(ctx,bx,by,bw,bh,6); ctx.fill();
  ctx.strokeStyle=npc.color; ctx.lineWidth=2;
  roundRect(ctx,bx,by,bw,bh,6); ctx.stroke();

  // Mini avatar
  const ax=bx+10, ay=by+10;
  ctx.fillStyle='rgba(255,255,255,0.04)';
  roundRect(ctx,ax,ay,58,58,4); ctx.fill();
  // draw tiny NPC portrait
  ctx.fillStyle=npc.color; ctx.fillRect(ax+16,ay+31,25,18);
  ctx.fillStyle='#f0c070'; ctx.fillRect(ax+18,ay+15,21,20);
  ctx.fillStyle=npc.hat; ctx.fillRect(ax+14,ay+12,28,5); ctx.fillRect(ax+17,ay+8,22,6);
  ctx.fillStyle='#2a1a0a'; ctx.fillRect(ax+22,ay+20,3,3); ctx.fillRect(ax+32,ay+20,3,3);

  // Name + topic
  ctx.textAlign='left'; ctx.font='bold 12px monospace';
  ctx.fillStyle=npc.color;
  ctx.fillText(npc.name, bx+76, by+20);
  ctx.font='9px monospace'; ctx.fillStyle='#ffdd44';
  ctx.fillText('Lição: ' + npc.topic, bx+76, by+35);

  // Dialog text (wrapped)
  ctx.fillStyle='#d8e8ff'; ctx.font='13px monospace';
  wrapText(line, bx+76, by+57, bw-90, 17);

  // Progress dots
  const dotY = by+bh-14;
  for (let i=0; i<total; i++) {
    ctx.beginPath();
    ctx.arc(CVW/2 - (total*10)/2 + i*10 + 5, dotY, 3, 0, Math.PI*2);
    ctx.fillStyle = i < cur ? npc.color : '#1a2a3a';
    ctx.fill();
  }

  // Continue hint
  const pls = 0.5+0.5*Math.sin(now*0.005);
  ctx.textAlign='right'; ctx.font='9px monospace';
  ctx.fillStyle=`rgba(0,255,180,${pls})`;
  ctx.fillText(cur<total ? '[E] continuar ▶' : '[E] fechar ✓', bx+bw-8, by+bh-8);
}

function wrapText(text, x, y, maxW, lh) {
  const words = text.split(' ');
  let line='', ly=y;
  for (let i=0; i<words.length; i++) {
    const test = line + words[i] + ' ';
    if (ctx.measureText(test).width > maxW && i > 0) {
      ctx.fillText(line, x, ly); line = words[i]+' '; ly += lh;
    } else { line = test; }
  }
  ctx.fillText(line, x, ly);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ── Main Loop ─────────────────────────
function loop(ts) {
  const dt = Math.min(ts - lastTs, 100);
  lastTs = ts;

  // Snapshot just-pressed keys for this frame
  const just = new Set(newk);
  newk.clear();

  update(dt, just);
  render(ts);

  requestAnimationFrame(loop);
}

requestAnimationFrame(ts => { lastTs = ts; requestAnimationFrame(loop); });

function openIndex() {
  window.location.href = "/";
}

(function() {
  const canvas = document.getElementById('c');
  const ids   = ['brilho', 'saturacao', 'contraste', 'matiz'];
  const props = ['brightness', 'saturate', 'contrast', 'hue-rotate'];

  function aplicarFiltros() {
    canvas.style.filter = ids.map((id, i) => {
      const val = document.getElementById(id).value;
      const unidade = id === 'matiz' ? '°' : '%';
      document.getElementById(id + 'Val').textContent = val + unidade;
      return id === 'matiz'
        ? `hue-rotate(${val}deg)`
        : `${props[i]}(${val}%)`;
    }).join(' ');
  }

  ids.forEach(id =>
    document.getElementById(id).addEventListener('input', aplicarFiltros)
  );
})();
</script>
